name: Ubuntu
# Qt官方没有linux平台的x86包
on: 
  push:
    paths:
      - '*.pro'
      - 'src/**'
      - '.github/workflows/ubuntu.yml'
  pull_request:
    paths:
      - '*.pro'
      - 'src/**'
      - '.github/workflows/ubuntu.yml' 
jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        qt_ver: [5.15.2]
        qt_arch: [gcc_64]
        exclude: 
          # Qt6.2.2 need GLIBC_2.28, ubuntu 18.04 have not.
          - os: ubuntu-18.04
            qt_ver: 6.2.2
            qt_arch: gcc_64
    steps:
      - name: 安装 Qt 
        uses: jurplel/install-qt-action@v2
        with:
          version: ${{ matrix.qt_ver }}
          cached: 'false'
      - name: ubuntu 安装 GL library
        run: sudo apt-get install -y libglew-dev libglfw3-dev
      - name: 拉取代码
        uses: actions/checkout@v2
        with:
          fetch-depth: 1
      - name: 编译 ubuntu 程序
        run: |
          qmake
          make
      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoguDesktop_${{ matrix.os }}_${{matrix.qt_ver}}.zip
          path: bin/release
